[build]
  command = "craco build"
  publish = "build"

# 1) SPA fallback: todas las rutas al index
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 2) Proxy al backend (evitas CORS y usar localhost por error)
[[redirects]]
  from = "/api/*"
  to = "https://backendsolicitudes.onrender.com/api/:splat"
  status = 200
  force = true

# 3) Headers de seguridad base
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# 4) Cache agresivo para assets estáticos (hash en nombre)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
